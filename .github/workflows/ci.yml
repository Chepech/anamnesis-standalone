name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm typecheck

      - name: Build core daemon
        run: pnpm --filter @anamnesis/core build

      - name: Build Electron main
        run: pnpm --filter @anamnesis/app build:main

      - name: Build renderer
        run: pnpm --filter @anamnesis/app build:renderer
