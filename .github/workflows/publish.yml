name: Publish

on:
  push:
    tags:
      - 'v[0-9]*'

permissions:
  contents: write

jobs:
  draft-release:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute changelog
        id: changelog
        shell: bash
        run: |
          CURRENT_TAG="${GITHUB_REF_NAME}"
          PREVIOUS_TAG=$(git tag --sort=-version:refname | grep -v "^${CURRENT_TAG}$" | head -1)
          if [ -n "$PREVIOUS_TAG" ]; then
            LOG=$(git log "${PREVIOUS_TAG}..HEAD" --oneline --no-merges)
          else
            LOG=$(git log --oneline --no-merges)
          fi
          echo "CHANGELOG<<EOF" >> "$GITHUB_OUTPUT"
          echo "$LOG" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Extract tag metadata
        id: meta
        run: echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          name: "Anamnesis ${{ steps.meta.outputs.tag }}"
          body: |
            <!-- Edit this section before publishing — it is pre-filled from git log. -->

            ${{ steps.changelog.outputs.CHANGELOG }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    needs: draft-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            pkg_script: package:linux
          - os: macos-latest
            pkg_script: package:mac
          - os: windows-latest
            pkg_script: package:win

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build core daemon
        run: pnpm --filter @anamnesis/core build

      - name: Deploy core production dependencies
        run: pnpm --filter @anamnesis/core deploy --legacy --prod packages/app/.deploy-core

      - name: Remove circular pnpm self-reference from deploy
        shell: bash
        run: rm -rf packages/app/.deploy-core/node_modules/.pnpm/node_modules/

      - name: Rebuild sharp native binding in deploy
        shell: bash
        run: |
          SHARP_PNPM=$(find packages/app/.deploy-core/node_modules/.pnpm -maxdepth 1 -name "sharp@*" -type d | head -1)
          if [ -n "$SHARP_PNPM" ]; then
            cd "$SHARP_PNPM/node_modules/sharp"
            npm run install || true
          fi

      - name: Build Electron main
        run: pnpm --filter @anamnesis/app build:main

      - name: Build renderer
        run: pnpm --filter @anamnesis/app build:renderer

      - name: Package and upload to draft release
        run: pnpm --filter @anamnesis/app ${{ matrix.pkg_script }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          WIN_CSC_LINK: ''
